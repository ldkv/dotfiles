_subdirectory: template
_templates_suffix: ".j2"

user_name:
  type: str
  help: "Name for git config"
  default: "Vu LE"

user_email:
  type: str
  help: "Email for git config"
  default: "ledkvu@gmail.com"

_tasks:
  - name: "Oneshot setup after first copy"
    command: |
      echo "Setup with {{ _copier_conf|to_json }}"
      echo $DOTFILES_PATH
      {%if _copier_conf.os == 'windows'%}pwsh -c {%endif%}uv run -m scripts.setup --user_name "{{ user_name }}" --user_email "{{ user_email }}"
    when: "{{ _copier_operation == 'copy' }}"
  - name: "Executing update routine"
    command: |
      echo "Update with {{ _copier_conf|to_json }}"
      echo $DOTFILES_PATH
      {%if _copier_conf.os == 'windows'%}pwsh -c {%endif%}uv run -m scripts.update {%if _copier_conf.data.simulator%}--simulator{%endif%}
    when: "{{ _copier_operation == 'copy' }}"
